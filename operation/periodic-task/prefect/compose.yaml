services:

  cratedb:
    image: docker.io/crate/crate:${CRATEDB_VERSION:-latest}
    command: >
      crate
        '-Cdiscovery.type=single-node'
        '-Cstats.enabled=true'
    ports:
      - "4200:4200"
      - "5432:5432"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:4200"]
      start_period: 3s
      interval: 1.5s
      retries: 30
      timeout: 30s

  prefect:
    image: docker.io/prefecthq/prefect:${PREFECT_VERSION:-3.7.0-python3.14}
    command: prefect server start
    ports:
      - "4201:4200"
    environment:
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      PREFECT_SERVER_API_HOST: "0.0.0.0"
      PREFECT_UI_API_URL: "http://localhost:4201/api"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:4200/api/health', timeout=1)"]
      start_period: 3s
      interval: 1.5s
      retries: 30
      timeout: 30s

  scheduler:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      CRATEDB_SQLALCHEMY_URL: "crate://crate:crate@cratedb:4200/"
      PREFECT_API_URL: "http://prefect:4200/api"
      PREFECT_SERVER_ALLOW_EPHEMERAL_MODE: "false"
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
    depends_on:
      cratedb:
        condition: service_healthy
      prefect:
        condition: service_healthy
