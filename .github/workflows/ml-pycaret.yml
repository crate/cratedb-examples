name: PyCaret

on:
  pull_request:
    branches: ~
    paths:
    - '.github/workflows/ml-pycaret.yml'
    - 'topic/machine-learning/pycaret/**'
    - '/requirements.txt'
  push:
    branches: [ main ]
    paths:
    - '.github/workflows/ml-pycaret.yml'
    - 'topic/machine-learning/pycaret/**'
    - '/requirements.txt'

  # Allow job to be triggered manually.
  workflow_dispatch:

  # Run job each night after CrateDB nightly has been published.
  schedule:
    - cron: '0 4 * * *'

# Cancel in-progress jobs when pushing to the same branch.
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  test:
    name: "
     Python: ${{ matrix.python-version }}
     CrateDB: ${{ matrix.cratedb-version }}
     on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-latest'
        python-version:
          - '3.10'
          - '3.11'
        cratedb-version:
          - 'nightly'

    services:
      cratedb:
        image: crate/crate:${{ matrix.cratedb-version }}
        ports:
          - 4200:4200
          - 5432:5432
        env:
          CRATE_HEAP_SIZE: 4g

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:

      - name: Acquire sources
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: 'true'
          cache-dependency-glob: |
            requirements.txt
            topic/machine-learning/pycaret/requirements*.txt
          cache-suffix: ${{ matrix.python-version }}
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install utilities
        run: uv pip install 'setuptools<82' --requirements=requirements.txt

      - name: Validate topic/machine-learning/pycaret
        run: ngr test topic/machine-learning/pycaret
