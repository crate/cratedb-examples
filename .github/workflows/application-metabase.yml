name: Metabase

on:
  pull_request:
    branches: ~
    paths:
    - '.github/workflows/application-metabase.yml'
    - 'application/metabase/**'
    - '/requirements.txt'
  push:
    branches: [ main ]
    paths:
    - '.github/workflows/application-metabase.yml'
    - 'application/metabase/**'
    - '/requirements.txt'

  # Allow job to be triggered manually.
  workflow_dispatch:

  # Run job each night after CrateDB nightly has been published.
  schedule:
    - cron: '0 3 * * *'

# Cancel in-progress jobs when pushing to the same branch.
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:

  test:
    name: "
     CrateDB: ${{ matrix.cratedb-version }}
     on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ "ubuntu-22.04" ]
        python-version: [ "3.12" ]
        cratedb-version: [ "nightly" ]

    steps:

      - name: Acquire sources
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: 'true'
          cache-dependency-glob: |
            requirements.txt
            application/metabase/pyproject.toml
            application/metabase/requirements*.txt
          cache-suffix: ${{ matrix.python-version }}
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install utilities
        run: uv pip install --requirements=requirements.txt

      - name: Validate application/metabase
        run: ngr test application/metabase
