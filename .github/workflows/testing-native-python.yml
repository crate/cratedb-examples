name: Native Testing with Python

on:
  pull_request:
    branches: ~
    paths:
    - '.github/workflows/testing-native-python.yml'
    - 'testing/native/python**'
    - '/requirements.txt'
  push:
    branches: [ main ]
    paths:
    - '.github/workflows/testing-native-python.yml'
    - 'testing/native/python**'
    - '/requirements.txt'

  # Allow job to be triggered manually.
  workflow_dispatch:

  # Run job each night after CrateDB nightly has been published.
  schedule:
    - cron: '0 3 * * *'

# Cancel in-progress jobs when pushing to the same branch.
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  test:
    name: "
     Python: ${{ matrix.python-version }}
     CrateDB: ${{ matrix.cratedb-version }}
     on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-latest'
          - 'macos-15-intel'
        python-version:
          - '3.8'
          - '3.14'
        cratedb-version:
          - 'nightly'

    env:
      PIP_PRE: true
      UV_PRERELEASE: allow

    steps:

      - name: Acquire sources
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: 'true'
          cache-dependency-glob: |
            requirements.txt
            testing/native/python-pytest/requirements.txt
            testing/native/python-unittest/requirements.txt
          cache-suffix: ${{ matrix.python-version }}
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install utilities
        run: uv pip install --requirements=requirements.txt

      - name: Validate testing/native/python-{pytest,unittest}
        run: |
          ngr test testing/native/python-pytest
          ngr test testing/native/python-unittest
