name: Go pgx

on:
  pull_request:
    paths:
    - '.github/workflows/lang-go-pgx.yml'
    - 'by-language/go-pgx/**'
    - '/requirements.txt'
  push:
    branches: [ main ]
    paths:
    - '.github/workflows/lang-go-pgx.yml'
    - 'by-language/go-pgx/**'
    - '/requirements.txt'

  # Allow job to be triggered manually.
  workflow_dispatch:

  # Run job each night after CrateDB nightly has been published.
  schedule:
    - cron: '0 3 * * *'

# Cancel in-progress jobs when pushing to the same branch.
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  test:
    name: "
     Go: ${{ matrix.go-version }}
     Protocol: ${{ matrix.postgresql-protocol-version }}
     CrateDB: ${{ matrix.cratedb-version }}
    "
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ 'ubuntu-latest' ]
        cratedb-version: [ 'nightly' ]
        postgresql-protocol-version:
          - '3.0'
          - '3.2'
        go-version:
          - '1.25.x'
          - '1.26.x'

    services:
      cratedb:
        image: crate/crate:${{ matrix.cratedb-version }}
        ports:
          - 4200:4200
          - 5432:5432
        env:
          CRATE_HEAP_SIZE: 4g

    steps:

      - name: Acquire sources
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Validate by-language/go-pgx
        run: |
          cd by-language/go-pgx
          go run . --protocol-version="${{ matrix.postgresql-protocol-version }}"
