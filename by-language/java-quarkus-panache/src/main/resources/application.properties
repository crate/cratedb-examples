quarkus.datasource.db-kind = postgresql

# Crate DB specific configuration
quarkus.datasource.jdbc.url=jdbc:postgresql://myCrateHost.com:5432/crate
quarkus.datasource.username=crate
quarkus.datasource.password=crate
quarkus.hibernate-orm.dialect=io.crate.CrateDbDialect

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.sql-load-script=no-file